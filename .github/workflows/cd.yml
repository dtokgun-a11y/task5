
name: Roman Converter CD

on:
  push:
    branches: [ "main" ]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  test-and-lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install
        working-directory: ./Roman-Converter

      - name: Run tests
        run: npm test
        working-directory: ./Roman-Converter

      - name: Run lint
        run: npm run lint
        working-directory: ./Roman-Converter

  deploy:
    needs: test-and-lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./Roman-Converter

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
